AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: pairwisevote.com — frontend (S3 + CloudFront + ACM + Route 53)

Parameters:
  DomainName:
    Type: String
    Default: pairwisevote.com
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone for DomainName.
  AlertEmail:
    Type: String
    Default: seanshubin@gmail.com
    Description: Email to receive ops alerts (Lambda errors, CLIENT ERROR log lines).

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-frontend"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ACM cert covering the apex and www. CloudFront proxies /api/... to API
  # Gateway, so the SPA + API live on the same origin and the api subdomain
  # is not used (CloudFront talks to API Gateway via its built-in
  # *.execute-api.amazonaws.com hostname, which doesn't need our cert).
  FrontendCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "www.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
        - DomainName: !Sub "www.${DomainName}"
          HostedZoneId: !Ref HostedZoneId

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${DomainName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: BackendApi
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref DomainName
          - !Sub "www.${DomainName}"
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref FrontendCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt FrontendOriginAccessControl.Id
          # API Gateway origin reached via the auto-generated execute-api hostname.
          # CloudFront's AllViewerExceptHostHeader policy ensures API Gateway gets
          # its own Host header (not pairwisevote.com), which it requires.
          - Id: ApiOrigin
            DomainName: !Sub "${BackendApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          # AWS-managed CachingOptimized policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CacheBehaviors:
          # /api requests proxy to API Gateway with no caching, full cookie/auth
          # forwarding. Browser sees a single origin (pairwisevote.com), so
          # cookies + Authorization headers travel as same-origin — no CORS,
          # no cross-site cookie issues.
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            # AWS-managed CachingDisabled
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            # AWS-managed AllViewerExceptHostHeader — forwards cookies, auth,
            # query strings; lets API Gateway use its own Host header.
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        # SPA fallback for client-side routing (bookmarks, deep links, refresh
        # on /elections/Foo): when the user hits a path that isn't an actual
        # asset in S3, S3 returns 403 (the OAC bucket policy grants only
        # s3:GetObject — no ListBucket — so missing objects look like access
        # denials). We rewrite that to /index.html with 200 so the SPA can
        # parse the path itself.
        #
        # Note: CustomErrorResponses are distribution-level, so we deliberately
        # do NOT include a 404 rule here. API Gateway legitimately returns 404
        # for not-found resources (e.g. GET /api/election/Bogus), and rewriting
        # those to index.html would break the JSON contract on the wire.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  ApexARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        # CloudFront's well-known global hosted zone ID for alias targets.
        HostedZoneId: Z2FDTNDATAQYW2

  ApexAaaaRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwAaaaRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # ============================================================
  # Backend: DynamoDB + Lambda + HTTP API
  # ============================================================
  # The SPA reaches the API at https://pairwisevote.com/api/... via the
  # CloudFront /api/* behavior above. No api.pairwisevote.com subdomain.

  # JWT signing secret — generated once at stack creation, never visible in
  # CFN parameters or console. Lambda receives it via env-var dynamic reference
  # at deploy time; no runtime SecretsManager IAM permission needed.
  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-jwt-secret"
      Description: HMAC256 secret for access + refresh JWTs
      GenerateSecretString:
        ExcludePunctuation: true
        PasswordLength: 64

  # ─── Discord OAuth secrets ────────────────────────────────────────────────
  # The four SSM parameters at /${AWS::StackName}/discord/{client-id,
  # client-secret, redirect-uri, guild-id} are operator-managed — they live
  # outside this template entirely. The Lambda env vars below carry only the
  # PATHS; the actual values are read at runtime from SSM and cached for
  # five minutes. Rotate any value with `aws ssm put-parameter --overwrite`
  # (use `--type SecureString` for client-secret); the cache picks up the
  # new value within one TTL window — no redeploy required.
  #
  # Provisioning them in CFN was tried and rejected: CFN can't create the
  # SecureString client-secret at all, and CFN-managed parameters with
  # placeholder values (a) trip "already exists" errors against
  # parameters created out-of-band first, and (b) couple deploy timing to
  # secret provisioning. Operator-managed via the scripts in
  # .local/temp-scripts/ keeps secrets and infrastructure independent.
  # The IAM policy on the Lambda function (below) grants ssm:GetParameter
  # on these four paths only.

  # Hard-coded table names (vote_data, vote_event_log) match the constants
  # in DynamoDbSingleTableSchema.kt — keeps the code simple, locks the stack
  # to one deploy per account/region.
  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: vote_data
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  EventLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: vote_event_log
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: N
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  BackendApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]
        AllowOrigins:
          - !Sub "https://${DomainName}"
          - !Sub "https://www.${DomainName}"
        MaxAge: 3600

  # Explicit log group with short retention. Old-version logs are not useful here;
  # 1-day retention costs nothing and avoids accumulation. To wipe right now,
  # delete the group manually — Lambda recreates it on next invocation.
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-backend"
      RetentionInDays: 1

  BackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-backend"
      # CFN `package` rewrites this local path to s3://... at deploy time.
      CodeUri: ../backend/build/libs/vote-backend-lambda.jar
      Handler: com.seanshubin.vote.backend.lambda.LambdaHandler::handleRequest
      Runtime: java21
      Architectures:
        - arm64
      MemorySize: 1024
      Timeout: 30
      # SnapStart restores a snapshot of the initialized JVM on cold start —
      # cuts cold starts from seconds to ~300-500ms. Free for Java 21.
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      LoggingConfig:
        LogGroup: !Ref BackendLogGroup
        # Lambda parses each stdout line as JSON and forwards as structured
        # events to CloudWatch — unlocks Logs Insights field queries.
        # Our app already emits JSON via logback's LogstashEncoder.
        LogFormat: JSON
        ApplicationLogLevel: INFO
        SystemLogLevel: WARN
      Environment:
        Variables:
          # Resolved at deploy time — value is baked into the Lambda config
          # but never appears in CFN parameters or template output.
          JWT_SECRET: !Sub "{{resolve:secretsmanager:${JwtSecret}:SecretString}}"
          # Frontend origin used to build OAuth redirect URLs.
          FRONTEND_BASE_URL: !Sub "https://${DomainName}"
          # The four env-var names are declared as constants in
          # backend/.../dependencies/EnvVars.kt; their VALUES point at the
          # SSM parameter PATHS. The actual Discord secrets are fetched from
          # SSM at runtime — they never appear in this template, the Lambda
          # config, or any code file.
          DISCORD_CLIENT_ID_PARAMETER_NAME: !Sub "/${AWS::StackName}/discord/client-id"
          DISCORD_CLIENT_SECRET_PARAMETER_NAME: !Sub "/${AWS::StackName}/discord/client-secret"
          DISCORD_REDIRECT_URI_PARAMETER_NAME: !Sub "/${AWS::StackName}/discord/redirect-uri"
          DISCORD_GUILD_ID_PARAMETER_NAME: !Sub "/${AWS::StackName}/discord/guild-id"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventLogTable
        # Read the four Discord OAuth parameters. Scoped to this stack's
        # parameters so a compromised Lambda can't enumerate other secrets.
        # kms:Decrypt is needed for the SecureString client-secret since it
        # is encrypted with the default AWS-managed KMS key for SSM.
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/discord/client-id"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/discord/client-secret"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/discord/redirect-uri"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/discord/guild-id"
            - Effect: Allow
              Action:
                - kms:Decrypt
              # Default AWS-managed KMS key for SSM is referenced by alias;
              # using the alias here means the policy stays valid even if the
              # key id changes (e.g., region migrations or AWS rotations).
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/aws/ssm"
              Condition:
                StringEquals:
                  "kms:ViaService": !Sub "ssm.${AWS::Region}.amazonaws.com"
      Events:
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref BackendApi
            Method: ANY
            Path: /{proxy+}
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref BackendApi
            Method: ANY
            Path: /

  # ============================================================
  # Alerts: SNS topic, email subscription, two alarms
  # ============================================================

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alerts"
      DisplayName: pairwisevote alerts

  # First deploy creates a "PendingConfirmation" subscription — AWS sends a
  # confirmation email; the recipient must click the link before notifications
  # start flowing. Idempotent: re-deploys leave a confirmed sub alone.
  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  ClientErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref BackendLogGroup
      # Substring match in the JSON message body. Logback writes the line
      # produced by RequestRouter.handleLogClientError, which starts with
      # "CLIENT ERROR:". Match-pattern syntax is not regex; quotes = literal.
      FilterPattern: '"CLIENT ERROR:"'
      MetricTransformations:
        - MetricNamespace: pairwisevote
          MetricName: ClientErrors
          MetricValue: "1"
          DefaultValue: 0

  ClientErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-client-errors"
      AlarmDescription: One or more frontend exceptions reported in the last 5 minutes
      Namespace: pairwisevote
      MetricName: ClientErrors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  BackendErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-backend-errors"
      AlarmDescription: Lambda function returned errors in the last 5 minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref BackendFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  BucketName:
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"
  DistributionId:
    Value: !Ref FrontendDistribution
    Export:
      Name: !Sub "${AWS::StackName}-DistributionId"
  DistributionDomainName:
    Value: !GetAtt FrontendDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-DistributionDomainName"
  BackendApiEndpoint:
    Value: !Sub "https://${BackendApi}.execute-api.${AWS::Region}.amazonaws.com"
  BackendThroughCloudFront:
    Value: !Sub "https://${DomainName}/api"
  DiscordParameterPathPrefix:
    Description: >-
      SSM path prefix for the four operator-managed Discord OAuth
      parameters (client-id, client-secret, redirect-uri, guild-id).
      None are managed by this template — provision them with
      .local/temp-scripts/set-discord-ssm-parameters.ps1 (the
      client-secret is a SecureString; the other three are plain
      Strings). The Lambda's IAM policy and env vars in this template
      reference these paths directly.
    Value: !Sub "/${AWS::StackName}/discord/"
