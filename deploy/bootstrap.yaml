AWSTemplateFormatVersion: '2010-09-09'
Description: |
  One-time bootstrap for pairwisevote.com CI/CD. Creates the GitHub OIDC
  identity provider and an IAM role that GitHub Actions assumes via OIDC to
  deploy the frontend (and later, the backend) stack.

Parameters:
  GitHubRepo:
    Type: String
    Default: SeanShubin/vote
    Description: GitHub repository in OWNER/REPO form.
  RoleName:
    Type: String
    Default: github-actions-deploy
  CreateOidcProvider:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: |
      Create the GitHub OIDC identity provider. The provider is a single
      per-account resource shared across all repos, so set to `false` if it
      already exists. The bootstrap script auto-detects this.

Conditions:
  ShouldCreateOidcProvider: !Equals [!Ref CreateOidcProvider, 'true']

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # Thumbprints are no longer validated when the URL is github's known
      # OIDC issuer; AWS verifies via library-of-trusted-CAs. Listing one keeps
      # CFN happy.
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              # Always reference the well-known ARN — works whether the
              # provider was created by this stack or already existed.
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepo}:*"
      # Pragmatic v1 policy: broad AWS-managed permissions on the services
      # the deploy touches. Scope down once the system is settled.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudFrontFullAccess
        - arn:aws:iam::aws:policy/AWSCertificateManagerFullAccess
        - arn:aws:iam::aws:policy/AmazonRoute53FullAccess
        - arn:aws:iam::aws:policy/AWSLambda_FullAccess
        - arn:aws:iam::aws:policy/AmazonAPIGatewayAdministrator
        - arn:aws:iam::aws:policy/IAMFullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
        # CloudWatchFullAccess (the legacy v1) is the broadest single policy
        # we need: cloudwatch:* (metrics+alarms), logs:*, sns:* — one policy
        # covers what would otherwise be three. We're at the 10-managed-
        # policies-per-role IAM quota; consolidating here keeps headroom.
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
      Policies:
        - PolicyName: PassRoleSelf
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Required when CFN later provisions a Lambda execution role and
              # has to attach it. Scoped to roles named with the project prefix.
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/pairwisevote-*"
        # SecretsManager perms scoped to project-prefixed secrets. Inline
        # policies don't count toward the 10-managed-policies-per-role IAM
        # quota — useful here since we're already at 10 managed policies.
        - PolicyName: SecretsManagerProjectScope
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:TagResource
                  - secretsmanager:RestoreSecret
                Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:pairwisevote-*"
              # GetRandomPassword has no resource-level scoping — AWS requires "*".
              # CloudFormation calls this action when materializing GenerateSecretString
              # (here: when creating JwtSecret with an auto-generated password).
              - Effect: Allow
                Action:
                  - secretsmanager:GetRandomPassword
                Resource: "*"

  # S3 bucket where CI uploads packaged Lambda artifacts. CFN's `package`
  # command rewrites local CodeUri references to s3://... pointers in this bucket.
  DeployArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "pairwisevote-deploy-artifacts-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

Outputs:
  DeployRoleArn:
    Value: !GetAtt DeployRole.Arn
  AccountId:
    Value: !Ref AWS::AccountId
  DeployArtifactsBucket:
    Value: !Ref DeployArtifactsBucket
  GitHubSecretCommand:
    Description: Run this to set the GitHub secret (requires `gh` CLI).
    Value: !Sub "gh secret set AWS_ACCOUNT_ID --body ${AWS::AccountId} --repo ${GitHubRepo}"
