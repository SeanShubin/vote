name: Deploy

# Single deploy mode. Every push to master runs the same pipeline:
#   build artifacts -> CFN deploy -> S3 sync + CF invalidate ->
#     vote-dev rebuild-projection (idempotent — no-op when vote_data's
#     live shape already matches code's expected shape; full
#     drop+recreate+replay when the projection schema changed) ->
#     smoke test.
#
# There are no deploy modes. The previous Deploy-Mode: rewrite ceremony
# was replaced by application-managed vote_data + the rebuild-projection
# tool. See deploy/README.md for the rationale and recovery story.

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'documentation/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STACK_NAME: pairwisevote-frontend
  BOOTSTRAP_STACK: pairwisevote-bootstrap
  DOMAIN_NAME: pairwisevote.com

# The build jobs run in parallel on separate runners, then `deploy` fans them
# back in. Each build job uploads its artifact; `deploy` downloads them instead
# of rebuilding. The Gradle build cache (org.gradle.caching=true in
# gradle.properties, persisted across runs by setup-gradle) keeps the
# unavoidable per-job recompilation cheap on warm runs.
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build backend shadow JAR
        # -Pgit.hash bakes the commit into BuildInfo.kt so the running
        # backend can report exactly what it was built from.
        run: ./gradlew :backend:shadowJar -Pgit.hash=${{ github.sha }}

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/vote-backend-lambda.jar
          if-no-files-found: error
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build frontend production bundle
        run: |
          ./gradlew :frontend:assemble \
            -Papi.base.url=/api \
            -Pgit.hash=${{ github.sha }}

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bundle
          path: frontend/build/dist/js/productionExecutable/
          if-no-files-found: error
          retention-days: 1

  build-tools:
    # Builds the vote-dev CLI. The deploy job uses it to run
    # `rebuild-projection --prod --yes` after the CFN step.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build tools install
        run: ./gradlew :tools:installDist

      - name: Upload tools install
        uses: actions/upload-artifact@v4
        with:
          name: tools-install
          path: tools/build/install/vote-dev/
          if-no-files-found: error
          retention-days: 1

  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install graphviz (for schema diagram SVG rendering)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Generate code-structure + documentation reports
        # Transitively runs :analyzeCodeStructure and :schema-diagram:generateSchemaDiagram.
        # Failing this job blocks the deploy (deploy `needs` it) — analyzer's
        # maximumAllowedErrorCount=0 is the build gate against cycles +
        # ancestor/descendant violations. Reports are still uploaded below
        # (if: always()) when this fails.
        run: ./gradlew :documentation:generateDocumentation

      - name: Upload generated reports
        if: always()  # capture partial reports even when the build step failed
        uses: actions/upload-artifact@v4
        with:
          name: generated-reports-${{ github.run_number }}
          path: generated/
          retention-days: 14
          if-no-files-found: warn

  deploy:
    needs: [build-backend, build-frontend, build-tools, generate-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        # vote-dev (the rebuild-projection step) needs java on PATH.
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      # Download the artifacts built by the parallel jobs into the same paths
      # the build steps used to produce them, so the CFN package + S3 sync
      # steps below are unchanged.
      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-bundle
          path: frontend/build/dist/js/productionExecutable/

      - name: Download tools install
        uses: actions/download-artifact@v4
        with:
          name: tools-install
          path: tools/build/install/vote-dev/

      - name: Make vote-dev executable
        # actions/upload-artifact strips Unix exec bits.
        run: chmod +x tools/build/install/vote-dev/bin/vote-dev

      - name: Resolve bootstrap outputs (zone + artifacts bucket)
        id: meta
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${DOMAIN_NAME}." \
            --query 'HostedZones[0].Id' --output text | cut -d'/' -f3)
          ARTIFACTS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$BOOTSTRAP_STACK" \
            --query 'Stacks[0].Outputs[?OutputKey==`DeployArtifactsBucket`].OutputValue' \
            --output text)
          echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "artifacts_bucket=$ARTIFACTS_BUCKET" >> "$GITHUB_OUTPUT"

      - name: Package CloudFormation (uploads JAR, rewrites CodeUri)
        run: |
          aws cloudformation package \
            --template-file deploy/template.yaml \
            --s3-bucket "${{ steps.meta.outputs.artifacts_bucket }}" \
            --output-template-file /tmp/packaged-template.yaml

      - name: Reconcile vote_data projection shape
        # Must run BEFORE the CFN deploy. When the schema has changed,
        # the CFN deploy creates a new AWS::Lambda::Version, and AWS
        # probes the new version for stabilization by invoking it once.
        # The new Lambda's cold-init runs DynamoDbStartup.verifyMainTableShape,
        # which fail-closes (throws ProjectionShapeMismatchException) if the
        # live table is missing GSIs/attrs the new code expects. If the
        # rebuild step ran AFTER CFN, that probe would always fail on
        # schema-change deploys and CFN would roll back.
        #
        # Idempotent: a single DescribeTable when nothing changed; the full
        # drop+recreate+replay when DynamoDbSingleTableSchema.expectedMainTableShape
        # has diverged from the live table. The pause/resume of the event log
        # is internal to the tool — it only pauses when it actually has work
        # to do, so normal deploys leave the event log untouched.
        run: ./tools/build/install/vote-dev/bin/vote-dev rebuild-projection --prod --yes

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file /tmp/packaged-template.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides \
                DomainName="$DOMAIN_NAME" \
                HostedZoneId="${{ steps.meta.outputs.zone_id }}" \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --no-fail-on-empty-changeset

      - name: Sync frontend to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)
          # Two-pass cache strategy.
          #
          # HTML: no-cache (browsers must revalidate). The frontend gradle
          # build rewrites references inside index.html to /frontend.js?v=<ts>
          # and /styles.css?v=<ts> so the URL changes per build — but only if
          # the browser actually fetches a fresh index.html to see the new
          # version. Without this header, browsers heuristic-cache index.html
          # for hours and keep loading the stale query string (and therefore
          # the stale JS bundle, even after a CloudFront invalidation).
          #
          # Other assets: immutable + 1-year max-age. Each build emits a new
          # ?v= query string, so a fresh index.html produces a URL the browser
          # hasn't seen before and refetches. The first sync runs without
          # --delete (to avoid wiping non-HTML keys); the second sync owns
          # the delete pass with --exclude "*.html" so HTML is left alone.
          aws s3 sync \
            frontend/build/dist/js/productionExecutable/ \
            "s3://${BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache"
          aws s3 sync \
            frontend/build/dist/js/productionExecutable/ \
            "s3://${BUCKET}/" \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Publish deployed-version.json
        run: |
          # The Admin "Deployed versions" panel and the owner's emailed
          # report read this back over HTTPS. Written as its own step AFTER
          # the frontend sync so the sync's --delete pass (which owns the
          # non-HTML keys) can't remove it. no-cache so the manifest is
          # never served stale; the CloudFront invalidation below also covers it.
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)
          cat > deployed-version.json <<EOF
          {
          "gitHash": "${{ github.sha }}",
          "gitRef": "${{ github.ref }}",
          "runNumber": "${{ github.run_number }}",
          "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          aws s3 cp deployed-version.json "s3://${BUCKET}/deployed-version.json" \
            --cache-control "no-cache" \
            --content-type "application/json"

      - name: Invalidate CloudFront
        run: |
          DIST=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST" \
            --paths "/*"

      - name: Smoke-test backend
        run: |
          # Lambda first invocation may take ~10s for SnapStart-restored runtime;
          # warm it up and then assert it returns the placeholder JSON.
          # Backend is reached through CloudFront /api/* (not a separate api subdomain).
          for i in 1 2 3 4 5; do
            sleep 5
            BODY=$(curl -fsSL --max-time 30 "https://${DOMAIN_NAME}/api/health" || true)
            echo "Attempt $i: $BODY"
            if echo "$BODY" | grep -q '"status"'; then
              echo "Backend healthy."
              exit 0
            fi
          done
          echo "Backend smoke test failed."
          exit 1
