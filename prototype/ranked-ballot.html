<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranked Ballot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #18191b;
      --surface: #222426;
      --surf2:   #2a2c2e;
      --border:  #343638;
      --bord2:   #444648;
      --text:    #e6e2d8;
      --muted:   #6e6c66;
      --accent:  #f2c84b;
      --danger:  #e05a48;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 20px 80px;
    }

    .container { max-width: 560px; margin: 0 auto; }

    .header { margin-bottom: 32px; }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }
    .header p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

    .label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Arena ── */
    .arena-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .chip {
      padding: 18px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      line-height: 1.3;
      transition: background 0.1s, border-color 0.12s, color 0.1s, transform 0.08s;
    }
    .chip:hover { background: var(--surf2); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .chip:active { transform: translateY(0); }

    /* ── Ranked list ── */
    .ranked-header { display: flex; align-items: baseline; margin-bottom: 10px; }
    .undo-count { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

    #ranked-list { list-style: none; }

    /* height(62) + margin-bottom(5) = ROW_H(67) — must match JS constant */
    .ranked-item {
      position: relative;
      display: flex;
      align-items: center;
      height: 62px;
      margin-bottom: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      user-select: none;
      will-change: transform;
    }
    .ranked-item:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(242,200,75,0.2);
    }
    .ranked-item.is-dragging {
      background: var(--surf2);
      border-color: var(--accent);
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      z-index: 10;
    }
    .ranked-item.is-dragging .rank-num { color: var(--accent); }

    .ranked-item { cursor: grab; }
    .ranked-item.is-dragging { cursor: grabbing; }

    .drag-handle {
      width: 40px; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--bord2);
      font-size: 1.1rem;
      flex-shrink: 0;
      border-radius: 7px 0 0 7px;
      transition: color 0.1s;
    }
    .ranked-item:hover .drag-handle { color: var(--muted); }
    .item-btns { cursor: default; }

    .rank-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.55rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      width: 40px;
      text-align: center;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .ranked-item:hover .rank-num { color: var(--accent); }

    .ranked-name { flex: 1; font-size: 0.92rem; font-weight: 500; padding: 0 10px; }

    .item-btns { display: flex; align-items: center; gap: 3px; padding-right: 10px; flex-shrink: 0; }
    .item-btn {
      cursor: pointer;
      width: 34px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid transparent;
      border-radius: 5px;
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'Manrope', sans-serif;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .item-btn:hover:not(:disabled) { background: var(--surf2); color: var(--text); border-color: var(--border); }
    .item-btn:disabled { opacity: 0.2; cursor: default; }
    .remove-btn:hover:not(:disabled) {
      background: rgba(224,90,72,0.12);
      color: var(--danger);
      border-color: rgba(224,90,72,0.28);
    }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .undo-btn {
      cursor: pointer;
      padding: 9px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Manrope', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .undo-btn:hover:not(:disabled) { background: var(--surf2); color: var(--text); border-color: var(--bord2); }
    .undo-btn:disabled { opacity: 0.28; cursor: default; }
    .kbd-hint { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

    .empty-note { color: var(--muted); font-size: 0.84rem; padding: 16px 2px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Your Ballot</h1>
    <p>Click to rank · drag anywhere on a row to reorder live · ↑↓ to nudge · × to return · Ctrl+Z to undo</p>
  </div>

  <div id="arena-wrap" class="arena-wrap">
    <p class="label">Candidates — click to rank in order of preference</p>
    <div id="chips" class="chips"></div>
  </div>

  <div>
    <div class="ranked-header">
      <span class="label">Your ranking</span>
      <span class="undo-count" id="undo-count"></span>
    </div>
    <ul id="ranked-list"></ul>
    <p id="empty-note" class="empty-note"></p>
    <div class="toolbar">
      <button class="undo-btn" id="undo-btn" onclick="undo()" disabled>↩ Undo</button>
      <span class="kbd-hint">Focus a row · arrow keys to move</span>
    </div>
  </div>
</div>

<script>
  const CANDIDATES = [
    'Alice Chen',    'Bob Okafor',     'Carol Santos', 'David Kim',
    'Eve Nakamura',  'Frank Osei',     'Grace Patel',  'Henry Müller',
    'Iris Johansson','Jack Ferreira',  'Karen Okonkwo','Liam Novak'
  ];

  // Must match CSS: item height (62px) + margin-bottom (5px)
  const ROW_H = 67;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let arena      = shuffle(CANDIDATES);
  let ranked     = [];
  let history    = [];
  let prevRanked = null;  // snapshot before modification, consumed by renderFLIP
  let dragState  = null;  // { currentIndex, moved }
  let rafPending = false;

  // ── Arena ──────────────────────────────────────────────────────────────────

  function renderArena() {
    const wrap  = document.getElementById('arena-wrap');
    const chips = document.getElementById('chips');
    wrap.style.display = arena.length ? '' : 'none';
    chips.innerHTML = '';
    arena.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = name;
      btn.addEventListener('click', () => clickChip(name));
      chips.appendChild(btn);
    });
  }

  // ── Ranked list ────────────────────────────────────────────────────────────

  function renderList(draggingIdx = null) {
    const list = document.getElementById('ranked-list');
    list.innerHTML = '';
    ranked.forEach((name, i) => {
      const li = document.createElement('li');
      li.className   = 'ranked-item' + (i === draggingIdx ? ' is-dragging' : '');
      li.dataset.name  = name;
      li.dataset.index = i;
      li.tabIndex = 0;
      li.innerHTML = `
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="rank-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="ranked-name">${escHtml(name)}</span>
        <span class="item-btns">
          <button class="item-btn" title="Move up" onclick="moveItem(event,${i},-1)" ${i === 0 ? 'disabled' : ''}>↑</button>
          <button class="item-btn" title="Move down" onclick="moveItem(event,${i},1)" ${i === ranked.length - 1 ? 'disabled' : ''}>↓</button>
          <button class="item-btn remove-btn" title="Return to candidates" onclick="removeItem(event,${i})">×</button>
        </span>
      `;
      li.addEventListener('mousedown', e => {
        if (e.target.closest('.item-btns')) return;
        startDrag(e, i);
      });
      li.addEventListener('keydown', onKeyDown);
      list.appendChild(li);
    });

    document.getElementById('empty-note').textContent =
      ranked.length === 0 ? 'Click a candidate above to begin' : '';
    updateUndoUI();
  }

  // FLIP: items slide from their previous logical positions to new ones.
  // Call snapshotRanked() before modifying ranked, then modify, then call renderFLIP().
  function renderFLIP(draggingIdx = null) {
    const before = {};
    if (prevRanked) prevRanked.forEach((n, i) => { before[n] = i; });
    const after = {};
    ranked.forEach((n, i) => { after[n] = i; });

    renderList(draggingIdx);

    if (prevRanked) {
      // Apply inverted transforms so items appear at their old positions
      document.querySelectorAll('.ranked-item').forEach(el => {
        const n = el.dataset.name;
        if (before[n] == null || after[n] == null) return;
        const dy = (before[n] - after[n]) * ROW_H;
        if (Math.abs(dy) < 1) return;
        el.style.transition = 'none';
        el.style.transform  = `translateY(${dy}px)`;
      });
      // Force reflow so the browser registers the starting transform
      document.getElementById('ranked-list').offsetHeight;
      // Animate to natural (final) positions
      document.querySelectorAll('.ranked-item').forEach(el => {
        el.style.transition = 'transform 0.12s ease';
        el.style.transform  = '';
      });
    }

    prevRanked = null;
  }

  function snapshotRanked() { prevRanked = [...ranked]; }

  // ── Click actions ──────────────────────────────────────────────────────────

  function clickChip(name) {
    pushHistory();
    snapshotRanked();
    arena = arena.filter(n => n !== name);
    ranked.push(name);
    renderArena();
    renderFLIP();
  }

  function removeItem(e, i) {
    e.stopPropagation();
    pushHistory();
    snapshotRanked();
    const [name] = ranked.splice(i, 1);
    arena.push(name);
    renderArena();
    renderFLIP();
  }

  function moveItem(e, i, dir) {
    e.stopPropagation();
    const j = i + dir;
    if (j < 0 || j >= ranked.length) return;
    pushHistory();
    snapshotRanked();
    [ranked[i], ranked[j]] = [ranked[j], ranked[i]];
    renderFLIP();
  }

  function onKeyDown(e) {
    const i   = parseInt(this.dataset.index);
    const dir = e.key === 'ArrowUp' ? -1 : e.key === 'ArrowDown' ? 1 : 0;
    if (!dir) return;
    const j = i + dir;
    if (j < 0 || j >= ranked.length) return;
    e.preventDefault();
    pushHistory();
    snapshotRanked();
    [ranked[i], ranked[j]] = [ranked[j], ranked[i]];
    renderFLIP();
    requestAnimationFrame(() => {
      const items = document.querySelectorAll('.ranked-item');
      if (items[j]) items[j].focus();
    });
  }

  // ── Mouse drag: live reordering as you drag ────────────────────────────────

  function startDrag(e, index) {
    e.preventDefault();
    dragState = { currentIndex: index, moved: false };
    document.body.style.cursor     = 'grabbing';
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
  }

  function onMouseMove(e) {
    if (!dragState || rafPending) return;
    const clientY = e.clientY;
    rafPending = true;
    requestAnimationFrame(() => {
      rafPending = false;
      if (!dragState) return;
      const target = getTargetIndex(clientY);
      if (target !== dragState.currentIndex) {
        // Push history only on the first actual position change
        if (!dragState.moved) { pushHistory(); dragState.moved = true; }
        snapshotRanked();
        const item = ranked.splice(dragState.currentIndex, 1)[0];
        ranked.splice(target, 0, item);
        dragState.currentIndex = target;
        renderFLIP(target);
      }
    });
  }

  function onMouseUp() {
    dragState  = null;
    rafPending = false;
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup',   onMouseUp);
    renderList(); // clear is-dragging styling, no animation needed
  }

  // Which slot does clientY fall into?
  // Uses fixed row height so result is stable during FLIP animations.
  function getTargetIndex(clientY) {
    const rect = document.getElementById('ranked-list').getBoundingClientRect();
    const idx  = Math.round((clientY - rect.top) / ROW_H);
    return Math.max(0, Math.min(ranked.length - 1, idx));
  }

  // ── Undo ───────────────────────────────────────────────────────────────────

  function pushHistory() {
    history.push({ arena: [...arena], ranked: [...ranked] });
    if (history.length > 50) history.shift();
  }

  function undo() {
    if (!history.length) return;
    snapshotRanked();
    const prev = history.pop();
    arena  = prev.arena;
    ranked = prev.ranked;
    renderArena();
    renderFLIP();
  }

  function updateUndoUI() {
    document.getElementById('undo-btn').disabled = !history.length;
    document.getElementById('undo-count').textContent =
      history.length > 0 ? `${history.length} step${history.length !== 1 ? 's' : ''} undoable` : '';
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  });

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Initial render
  renderArena();
  renderList();
</script>
</body>
</html>
